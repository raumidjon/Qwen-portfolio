<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytics Dashboard | Umidjon</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <style>
    :root {
      --bg: #0f0c29;
      --sidebar-bg: rgba(255, 255, 255, 0.03);
      --card-bg: rgba(255, 255, 255, 0.07);
      --accent: #00d2ff;
      --purple: #9d50bb;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      height: 100vh;
      overflow: hidden;
    }

    .dashboard-container {
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      background: var(--sidebar-bg);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      padding: 30px 20px;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 40px;
    }
    .logo span {
      color: var(--accent);
    }

    nav a {
      display: block;
      color: #ccc;
      text-decoration: none;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      transition: 0.3s;
    }

    nav a.active,
    nav a:hover {
      background: var(--card-bg);
      color: white;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    /* Main Content */
    .main-content {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .stats-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .card h3 {
      font-size: 1.8rem;
      margin: 10px 0;
    }
    .up {
      color: #00ff88;
      font-size: 0.9rem;
    }
    .down {
      color: #ff4b2b;
      font-size: 0.9rem;
    }

    /* Grafiklar */
    .charts-section {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }

    .chart-container {
      background: var(--card-bg);
      padding: 25px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
  <body>
    <div class="dashboard-container">
      <aside class="sidebar">
        <div class="logo">Biznes<span>AI</span></div>
        <nav>
          <a href="#" class="active"><i class="fas fa-chart-line"></i> Dashboard</a>
          <a href="#"><i class="fas fa-users"></i> Mijozlar</a>
          <a href="#"><i class="fas fa-file-invoice"></i> Hisobotlar</a>
          <a href="#"><i class="fas fa-cog"></i> Sozlamalar</a>
        </nav>
      </aside>

      <main class="main-content">
        <header>
          <h2>Tahliliy Ma'lumotlar</h2>
          <div class="user-profile">Umidjon Raxmonov <i class="fas fa-user-circle"></i></div>
        </header>

        <section class="stats-cards">
          <div class="card">
            <p>Umumiy daromad</p>
            <h3>$12,450</h3>
            <span class="up"><i class="fas fa-arrow-up"></i> +12%</span>
          </div>
          <div class="card">
            <p>Yangi mijozlar</p>
            <h3>452</h3>
            <span class="up"><i class="fas fa-arrow-up"></i> +5%</span>
          </div>
          <div class="card">
            <p>Faol buyurtmalar</p>
            <h3>89</h3>
            <span class="down"><i class="fas fa-arrow-down"></i> -2%</span>
          </div>
        </section>

        <section class="charts-section">
          <div class="chart-container">
            <canvas id="salesChart"></canvas>
          </div>
          <div class="chart-container">
            <canvas id="categoryChart"></canvas>
          </div>
        </section>
      </main>
    </div>

    <script>
      // 1. Chiziqli grafik (Savdo tahlili)
      const salesCtx = document.getElementById('salesChart').getContext('2d')
      new Chart(salesCtx, {
        type: 'line',
        data: {
          labels: ['Dush', 'Sesh', 'Chor', 'Pay', 'Jum', 'Shan', 'Yak'],
          datasets: [
            {
              label: 'Haftalik daromad ($)',
              data: [1200, 1900, 1500, 2500, 2200, 3000, 2800],
              borderColor: '#00d2ff',
              backgroundColor: 'rgba(0, 210, 255, 0.2)',
              fill: true,
              tension: 0.4,
            },
          ],
        },
        options: {
          responsive: true,
          plugins: { legend: { labels: { color: 'white' } } },
          scales: {
            y: { ticks: { color: '#ccc' }, grid: { color: 'rgba(255,255,255,0.05)' } },
            x: { ticks: { color: '#ccc' }, grid: { display: false } },
          },
        },
      })

      // 2. Doiraviy grafik (Kategoriyalar)
      const catCtx = document.getElementById('categoryChart').getContext('2d')
      new Chart(catCtx, {
        type: 'doughnut',
        data: {
          labels: ['Elektronika', 'Kiyimlar', 'Oziq-ovqat'],
          datasets: [
            {
              data: [45, 25, 30],
              backgroundColor: ['#9d50bb', '#00d2ff', '#6c5ce7'],
              borderWidth: 0,
            },
          ],
        },
        options: {
          plugins: { legend: { position: 'bottom', labels: { color: 'white' } } },
        },
      })
    </script>
  </body>
</html>
