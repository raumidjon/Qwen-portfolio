<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Do'kon | Full-Stack</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <style>
    :root {
      --bg: #0a0a0c;
      --card-bg: rgba(255, 255, 255, 0.05);
      --accent: #00d2ff;
      --purple: #6c5ce7;
    }

    body {
      background: radial-gradient(circle at top, #1a1a2e, #0a0a0c);
      color: white;
      font-family: 'Poppins', sans-serif;
      margin: 0;
    }

    .navbar {
      padding: 20px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo span {
      color: var(--accent);
    }

    .cart-icon {
      position: relative;
      cursor: pointer;
      font-size: 1.5rem;
    }

    #cart-count {
      position: absolute;
      top: -10px;
      right: -10px;
      background: var(--purple);
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 50%;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      padding: 40px 5%;
    }

    /* Card Dizayni */
    .product-card {
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      transition: 0.3s;
      backdrop-filter: blur(5px);
    }

    .product-card:hover {
      transform: translateY(-10px);
      border-color: var(--accent);
    }

    .product-card img {
      width: 100%;
      height: 200px;
      object-fit: contain;
      border-radius: 15px;
    }

    .add-btn {
      background: linear-gradient(45deg, var(--accent), var(--purple));
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      margin-top: 15px;
      width: 100%;
    }

    /* Savatcha Paneli */
    .cart-sidebar {
      position: fixed;
      right: -400px;
      top: 0;
      width: 350px;
      height: 100%;
      background: #111;
      box-shadow: -5px 0 15px rgba(0, 0, 0, 0.5);
      transition: 0.4s;
      padding: 20px;
      z-index: 1000;
    }

    .cart-sidebar.active {
      right: 0;
    }
  </style>
  <body>
    <nav class="navbar">
      <div class="logo">Umidjon<span>Store</span></div>
      <div class="cart-icon" onclick="toggleCart()">
        <i class="fas fa-shopping-cart"></i>
        <span id="cart-count">0</span>
      </div>
    </nav>

    <header class="hero">
      <h1>Zamonaviy Gadgetlar</h1>
      <p>Sifatli va kafolatlangan mahsulotlar olami</p>
    </header>

    <main class="products-grid" id="products-container"></main>

    <div class="cart-sidebar" id="cart-sidebar">
      <div class="cart-header">
        <h2>Savatcha</h2>
        <button onclick="toggleCart()">&times;</button>
      </div>
      <div class="cart-items" id="cart-items"></div>
      <div class="cart-footer">
        <p>Jami: <span id="total-price">0</span> so'm</p>
        <button class="checkout-btn">To'lovga o'tish</button>
      </div>
    </div>

    <script>
      const products = [
        {
          id: 1,
          name: 'MacBook Pro M2',
          price: 15000000,
          img: 'https://v-p-s.uz/image/catalog/products/apple/macbook/macbook-pro-14-2023/apple-macbook-pro-14-m2-pro-1.jpg',
        },
        {
          id: 2,
          name: 'iPhone 15 Pro',
          price: 12000000,
          img: 'https://openshop.uz/uploads/products/photos/202309/8f09673966580f1a9415c92f750b28ec.jpg',
        },
        {
          id: 3,
          name: 'AirPods Max',
          price: 6000000,
          img: 'https://m.media-amazon.com/images/I/81ni3LS9vXL.jpg',
        },
      ]

      let cart = []

      const container = document.getElementById('products-container')

      // Mahsulotlarni chiqarish
      products.forEach((p) => {
        container.innerHTML += `
        <div class="product-card">
            <img src="${p.img}" alt="${p.name}">
            <h3>${p.name}</h3>
            <p>${p.price.toLocaleString()} so'm</p>
            <button class="add-btn" onclick="addToCart(${p.id})">Savatga qo'shish</button>
        </div>
    `
      })

      function addToCart(id) {
        const product = products.find((p) => p.id === id)
        cart.push(product)
        updateCart()
        // Real-time notification simulyatsiyasi
        alert(`${product.name} savatga qo'shildi!`)
      }

      function updateCart() {
        document.getElementById('cart-count').innerText = cart.length
        const cartItems = document.getElementById('cart-items')
        let total = 0
        cartItems.innerHTML = ''

        cart.forEach((item) => {
          total += item.price
          cartItems.innerHTML += `<div class="cart-item">${item.name} - ${item.price.toLocaleString()} so'm</div>`
        })

        document.getElementById('total-price').innerText = total.toLocaleString()
      }

      function toggleCart() {
        document.getElementById('cart-sidebar').classList.toggle('active')
      }
    </script>
  </body>
</html>
